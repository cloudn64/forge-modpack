[treasure_finder]
	#Maximum acquirable level of the enchantment
	#Range: 1 ~ 15
	max_level = 4
	#Enable or disable the enchantment completely
	is_enabled = true
	#Determines if this enchantment can appear in loot / the enchantment table etc.
	is_discoverable = true
	#Allow the enchantment to be applied to books
	is_allowed_on_books = true
	#Determines if the enchantment appears in trades
	is_tradeable = true
	#Treasure enchantments usually do not appear in the enchantment table
	is_treasure = false
	#How often the particles will spawn (in ticks)
	#Range: 1 ~ 1000
	particle_rate = 10

	#See default entries for reference
	#'resource' can be a block or block tag ('$treasure' relates to containers that have yet to generate their loot)
	#'from_level' and 'to_level' describe the bounds for which enchantment level the effect will be shown ('-1' means no limit)
	#'color' can be a known text color from Minecraft or one in the '#123456' format
	[[treasure_finder.entries]]
		resource = "$treasure"
		from_level = 1
		to_level = -1
		range = 24.0
		color_shift_rate = 2.0
		display_type = "PARTICLES"

